# Host test crate config — see lib Cargo.toml for the rationale.
#
# The workspace root `.cargo/config.toml` pins `build.target = x86_64-unknown-none.json`
# and enables `-Zbuild-std`. Cargo discovers config files by walking up the directory
# tree and CONCATENATES array values, so we cannot simply clear `build-std` here.
# Instead we (a) re-point `build.target` at the native host triple and (b) extend the
# inherited build-std set with `std`/`panic_abort` so the full standard library is
# built from source for the host (a single `core`, no duplicate-lang-item clash with a
# prebuilt std). This keeps the crate self-contained and host-runnable.
[build]
target = "x86_64-pc-windows-msvc"

[unstable]
build-std = ["std", "panic_abort"]
