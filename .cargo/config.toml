# riscv-port branch: the kernel targets bare-metal riscv64gc and compiles
# core/alloc/compiler_builtins from source (build-std). `cargo build` therefore
# produces the riscv64 staticlib; run.cmd links it with rust-lld + linker-riscv.ld.
[build]
target = "riscv64gc-unknown-none-elf"

[unstable]
build-std = ["core", "compiler_builtins", "alloc"]
build-std-features = ["compiler-builtins-mem"]

[target.riscv64gc-unknown-none-elf]
rustflags = [
    "-C", "relocation-model=static",
]
